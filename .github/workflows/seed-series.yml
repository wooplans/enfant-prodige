name: Seed Supabase series

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    name: Seed catalog into Supabase
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERIES_BUCKET: ${{ secrets.SUPABASE_SERIES_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed series
        run: node scripts/seed-series.mjs
