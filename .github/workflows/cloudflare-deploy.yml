name: Deploy to Cloudflare

on:
  push:
    branches:
      - codex/deploiement-mobile
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-codex-deploiement-mobile
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
      NEXT_PUBLIC_SITE_URL: https://bd.wooplans.com
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERIES_BUCKET: ${{ secrets.SUPABASE_SERIES_BUCKET }}
      ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prepare Worker secrets
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const secretNames = [
            "NEXT_PUBLIC_SUPABASE_URL",
            "NEXT_PUBLIC_SUPABASE_ANON_KEY",
            "NEXT_PUBLIC_WHATSAPP_NUMBER",
            "NEXT_PUBLIC_SITE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "SUPABASE_SERIES_BUCKET",
            "ADMIN_PASSWORD_HASH",
            "ADMIN_SESSION_SECRET",
          ];

          const secrets = {};
          for (const name of secretNames) {
            const value = process.env[name];
            if (value) {
              secrets[name] = value;
            }
          }

          fs.writeFileSync("worker-secrets.json", JSON.stringify(secrets));
          NODE

      - name: Build OpenNext output
        run: npx opennextjs-cloudflare build

      - name: Deploy Worker
        run: npx opennextjs-cloudflare deploy --secrets-file worker-secrets.json

      - name: Remove temporary secrets file
        if: always()
        run: rm -f worker-secrets.json
