name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_FACEBOOK_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_FACEBOOK_PIXEL_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          CHARIOW_API_KEY: ${{ secrets.CHARIOW_API_KEY }}
          CHARIOW_PRODUCT_CODE: ${{ secrets.CHARIOW_PRODUCT_CODE }}
          CHARIOW_PRODUCT_URL: ${{ secrets.CHARIOW_PRODUCT_URL }}
          CHARIOW_SNAP_SNIPPET: ${{ secrets.CHARIOW_SNAP_SNIPPET }}
          MONETBIL_SERVICE_KEY: ${{ secrets.MONETBIL_SERVICE_KEY }}
          MONETBIL_SERVICE_SECRET: ${{ secrets.MONETBIL_SERVICE_SECRET }}
          FACEBOOK_CONVERSION_API_TOKEN: ${{ secrets.FACEBOOK_CONVERSION_API_TOKEN }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
